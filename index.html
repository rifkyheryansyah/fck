<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekan Tombol</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .page {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .page.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(30px);
  }

  .page.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  /* Page 1 */
  .hint {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 2rem;
  }

  .press-btn {
    background: #fff;
    color: #0f0f0f;
    border: none;
    font-family: inherit;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 22px 60px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
    outline: none;
  }

  .press-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #e63946;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    z-index: 0;
  }

  .press-btn:hover::before { transform: translateX(0); }
  .press-btn:active { transform: scale(0.97); }
  .press-btn span { position: relative; z-index: 1; }

  /* Page 2 */
  .img-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .img-wrapper img {
    max-width: 480px;
    width: 90vw;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275) both;
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .back-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    outline: none;
  }

  .back-btn:hover { background: #222; color: #fff; }
</style>
</head>
<body>

<div class="page visible" id="page1">
  <p class="hint">Klik untuk lanjut</p>
  <button class="press-btn" onclick="goTo2()">
    <span>Tekan Tombol</span>
  </button>
</div>
